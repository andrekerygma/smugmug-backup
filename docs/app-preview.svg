<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1220" viewBox="0 0 1600 1220" role="img" aria-labelledby="title desc">
  <title id="title">SmugMug Backup application preview</title>
  <desc id="desc">A preview image of the SmugMug Backup dashboard showing credentials, backup controls, progress, galleries, and logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe3"/>
      <stop offset="100%" stop-color="#e6d8c4"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbf5ec"/>
      <stop offset="100%" stop-color="#eee2d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#8f7554" flood-opacity=".16"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #23324d; }
      .eyebrow { font-size: 18px; letter-spacing: 4px; font-weight: 700; fill: #c96e38; }
      .title { font-size: 60px; font-weight: 800; }
      .body { font-size: 24px; fill: #5f6c80; }
      .section { font-size: 20px; font-weight: 700; }
      .label { font-size: 16px; fill: #6d7788; }
      .value { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; fill: #7a8393; }
      .tiny { font-size: 13px; fill: #8b93a0; }
      .button { font-size: 16px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .mono { font-size: 15px; fill: #6d7788; }
    </style>
  </defs>

  <rect width="1600" height="1220" fill="url(#bg)"/>

  <rect x="24" y="16" width="1552" height="160" rx="28" fill="url(#hero)"/>
  <text x="36" y="48" class="eyebrow">LOCAL BACKUP WITH A VISUAL DASHBOARD</text>
  <text x="36" y="102" class="title">SmugMug Backup</text>
  <text x="36" y="146" class="body">Mirrors galleries to disk, skips what is already complete, and shows live progress.</text>

  <g filter="url(#shadow)">
    <rect x="1275" y="22" width="285" height="150" rx="28" fill="#fffaf3" stroke="#e7dccb"/>
  </g>
  <text x="1300" y="56" class="label">Connected account</text>
  <text x="1300" y="92" class="section" style="font-size:18px;">Not validated yet</text>
  <rect x="1300" y="112" width="70" height="34" rx="17" fill="#f1ebe2" stroke="#e0d3c0"/>
  <text x="1335" y="134" class="tiny" style="text-anchor:middle;">Waiting</text>

  <g filter="url(#shadow)">
    <rect x="24" y="198" width="758" height="660" rx="28" fill="#fffaf3" stroke="#e7dccb"/>
    <rect x="806" y="198" width="754" height="660" rx="28" fill="#fffaf3" stroke="#e7dccb"/>
    <rect x="24" y="882" width="1536" height="302" rx="28" fill="#fffaf3" stroke="#e7dccb"/>
  </g>

  <text x="48" y="246" class="section">Credentials</text>
  <text x="48" y="278" class="body" style="font-size:18px;">Enter only the API key and API secret. Account tokens can be generated by the connect</text>
  <text x="48" y="306" class="body" style="font-size:18px;">button.</text>

  <text x="48" y="362" class="label">API base URL</text>
  <rect x="48" y="378" width="350" height="54" rx="16" fill="#fffefb" stroke="#d9d3c7" stroke-width="2"/>
  <text x="68" y="413" class="mono">https://api.smugmug.com</text>

  <text x="414" y="362" class="label">Backup folder</text>
  <rect x="414" y="378" width="344" height="54" rx="16" fill="#fffefb" stroke="#d9d3c7" stroke-width="2"/>

  <text x="48" y="472" class="label">Parallel downloads</text>
  <rect x="48" y="488" width="350" height="54" rx="16" fill="#fffefb" stroke="#d9d3c7" stroke-width="2"/>
  <text x="68" y="523" class="mono">4</text>

  <text x="414" y="472" class="label">API key</text>
  <rect x="414" y="488" width="344" height="54" rx="16" fill="#fffefb" stroke="#d9d3c7" stroke-width="2"/>
  <text x="434" y="523" class="mono">Paste here to replace</text>

  <text x="48" y="582" class="label">API secret</text>
  <rect x="48" y="598" width="350" height="54" rx="16" fill="#fffefb" stroke="#d9d3c7" stroke-width="2"/>
  <text x="68" y="633" class="mono">Paste here to replace</text>

  <rect x="414" y="598" width="190" height="56" rx="28" fill="#1f8069"/>
  <text x="509" y="626" class="button" fill="#ffffff">Save configuration</text>

  <rect x="414" y="670" width="214" height="56" rx="28" fill="#eef7f0" stroke="#c7dcca"/>
  <text x="521" y="698" class="button" fill="#287561">Connect to SmugMug</text>

  <g>
    <rect x="48" y="750" width="118" height="36" rx="18" fill="#f0ece5"/>
    <rect x="176" y="750" width="136" height="36" rx="18" fill="#f0ece5"/>
    <rect x="322" y="750" width="208" height="36" rx="18" fill="#f0ece5"/>
    <rect x="540" y="750" width="176" height="36" rx="18" fill="#f0ece5"/>
    <rect x="48" y="794" width="160" height="36" rx="18" fill="#f0ece5"/>
    <text x="107" y="772" class="tiny" style="text-anchor:middle;">API key missing</text>
    <text x="244" y="772" class="tiny" style="text-anchor:middle;">API secret missing</text>
    <text x="426" y="772" class="tiny" style="text-anchor:middle;">Account not authorized yet</text>
    <text x="628" y="772" class="tiny" style="text-anchor:middle;">Account secret missing</text>
    <text x="128" y="816" class="tiny" style="text-anchor:middle;">4 parallel downloads</text>
  </g>

  <text x="830" y="246" class="section">Control</text>
  <text x="830" y="278" class="body" style="font-size:18px;">Scan galleries, start the backup, and follow the current status.</text>

  <rect x="830" y="320" width="144" height="52" rx="26" fill="#e8f7ef" stroke="#c6ddcd"/>
  <text x="902" y="346" class="button" fill="#2d7c65">Scan galleries</text>
  <rect x="990" y="320" width="140" height="52" rx="26" fill="#a6ccb6"/>
  <text x="1060" y="346" class="button" fill="#ffffff">Start backup</text>
  <rect x="1146" y="320" width="80" height="52" rx="26" fill="#f8e9e1"/>
  <text x="1186" y="346" class="button" fill="#d8a88f">Stop</text>

  <g>
    <rect x="830" y="392" width="230" height="94" rx="24" fill="#fffefb" stroke="#d9d3c7"/>
    <rect x="1076" y="392" width="230" height="94" rx="24" fill="#fffefb" stroke="#d9d3c7"/>
    <rect x="1322" y="392" width="214" height="94" rx="24" fill="#fffefb" stroke="#d9d3c7"/>
    <text x="850" y="428" class="label">Galleries</text>
    <text x="850" y="464" class="section" style="font-size:22px;">0/0</text>
    <text x="1096" y="428" class="label">Backup status</text>
    <text x="1096" y="464" class="section" style="font-size:22px;">Idle</text>
    <text x="1342" y="428" class="label">Files downloaded</text>
    <text x="1342" y="464" class="section" style="font-size:22px;">0</text>
  </g>

  <g>
    <rect x="830" y="510" width="230" height="94" rx="24" fill="#fffefb" stroke="#d9d3c7"/>
    <rect x="1076" y="510" width="230" height="94" rx="24" fill="#fffefb" stroke="#d9d3c7"/>
    <rect x="1322" y="510" width="214" height="94" rx="24" fill="#fffefb" stroke="#d9d3c7"/>
    <text x="850" y="546" class="label">Current throughput</text>
    <text x="850" y="582" class="section" style="font-size:22px;">--</text>
    <text x="1096" y="546" class="label">Current gallery ETA</text>
    <text x="1096" y="582" class="section" style="font-size:22px;">--</text>
    <text x="1342" y="546" class="label">Total ETA</text>
    <text x="1342" y="582" class="section" style="font-size:22px;">--</text>
  </g>

  <text x="830" y="640" class="section" style="font-size:18px;">Overall progress</text>
  <text x="1532" y="640" class="label" style="text-anchor:end;">0%</text>
  <rect x="830" y="654" width="706" height="18" rx="9" fill="#e8ebe3"/>
  <rect x="830" y="654" width="130" height="18" rx="9" fill="#d8e6dc"/>

  <text x="830" y="714" class="section" style="font-size:18px;">Current file</text>
  <text x="1532" y="714" class="label" style="text-anchor:end;">0%</text>
  <rect x="830" y="728" width="706" height="18" rx="9" fill="#ece7dd"/>
  <rect x="830" y="728" width="102" height="18" rx="9" fill="#e1dbcf"/>

  <rect x="830" y="764" width="706" height="92" rx="22" fill="#f2ece2"/>
  <text x="850" y="800" class="tiny">Current gallery</text>
  <text x="850" y="834" class="section" style="font-size:16px;">None</text>
  <text x="1188" y="800" class="tiny">Current file</text>
  <text x="1188" y="834" class="section" style="font-size:16px;">None</text>

  <text x="48" y="930" class="section">Galleries</text>
  <text x="48" y="964" class="body" style="font-size:18px;">Status is saved so the app does not redo a gallery that is already complete.</text>
  <line x1="48" y1="1046" x2="1536" y2="1046" stroke="#d8d0c2"/>
  <line x1="48" y1="1130" x2="1536" y2="1130" stroke="#d8d0c2"/>
  <text x="64" y="1020" class="tiny">Status</text>
  <text x="304" y="1020" class="tiny">Gallery</text>
  <text x="570" y="1020" class="tiny">Local folder</text>
  <text x="950" y="1020" class="tiny">Summary</text>
  <text x="1268" y="1020" class="tiny">Last run</text>
  <text x="800" y="1090" class="small" style="text-anchor:middle;">No galleries loaded yet.</text>

  <g filter="url(#shadow)">
    <rect x="24" y="1006" width="1536" height="178" rx="28" fill="#fffaf3" stroke="#e7dccb"/>
  </g>
  <text x="48" y="1042" class="section">Log</text>
  <text x="48" y="1076" class="body" style="font-size:18px;">Most recent process messages.</text>
  <rect x="48" y="1116" width="1488" height="98" rx="20" fill="#fffefb" stroke="#d9d3c7"/>
  <text x="68" y="1152" class="small">No</text>
  <text x="68" y="1180" class="small">messages</text>
  <text x="68" y="1208" class="small">yet.</text>
</svg>
